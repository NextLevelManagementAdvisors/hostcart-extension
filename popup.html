<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Hostcart Connector</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 14px;
    margin: 0;
    padding: 16px;
    width: 300px;
    color: #1e293b;
  }
  h1 { font-size: 16px; margin: 0 0 12px; font-weight: 600; }
  .status { padding: 10px 12px; border-radius: 6px; margin-bottom: 10px; }
  .status.paired { background: #f0fdf4; color: #166534; }
  .status.unpaired { background: #fef2f2; color: #991b1b; }
  .service { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e2e8f0; }
  .service:last-child { border-bottom: none; }
  .service-name { font-weight: 500; }
  .service-status { font-size: 12px; color: #64748b; }
  .service-status.ok { color: #16a34a; }
  .service-status.stale { color: #d97706; }
  button {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #cbd5e1;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin-top: 10px;
  }
  button:hover { background: #f1f5f9; }
  button.primary { background: #0f172a; color: #fff; border-color: #0f172a; }
  button.primary:hover { background: #1e293b; }
  .pair-input {
    width: 100%;
    padding: 8px;
    font-size: 18px;
    letter-spacing: 2px;
    text-align: center;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    margin-bottom: 8px;
    font-family: monospace;
  }
  .hint { font-size: 12px; color: #64748b; margin-top: 8px; }
</style>
</head>
<body>
<h1>Hostcart Connector</h1>
<div id="body"></div>
<script src="popup.js"></script>
</body>
</html>
